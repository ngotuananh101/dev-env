name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
      release_name:
        description: "Release name (e.g. Version 1.0.0)"
        required: true
      prerelease:
        description: "Mark as pre-release?"
        type: boolean
        default: false

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      # Rebuild native modules (better-sqlite3, node-pty)
      - name: Rebuild Native Modules
        run: npm run rebuild

      - name: Build Electron App
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Zip win-unpacked
        run: Compress-Archive -Path release/win-unpacked -DestinationPath release/win-unpacked.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.release_name }}
          prerelease: ${{ inputs.prerelease }}
          files: |
            release/*.exe
            release/win-unpacked.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
